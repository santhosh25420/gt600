version: '3.8'

services:
  gt600:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gt600-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gt/open"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

